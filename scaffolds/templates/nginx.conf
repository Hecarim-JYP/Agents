# client 컨테이너의 정적 서빙 설정 (docker.md 2-3절).
# 프록시(Caddy)가 앞단에서 HTTPS·라우팅을 처리하므로 여기서는 정적 파일만 책임진다.

server {
    listen 8080;
    listen [::]:8080;        # IPv6도 함께 — 컨테이너 안의 localhost는 ::1로 먼저 풀린다
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — 새로고침·딥링크에서 404가 나지 않게 한다
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 해시가 붙은 빌드 산출물은 장기 캐시, index.html은 캐시하지 않는다
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
