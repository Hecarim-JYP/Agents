# proxy 컨테이너(nginx-unprivileged)의 라우팅 설정 (docker.md 7절).
# 사내망 전용(HTTP) 기본 — 외부 노출 + 자동 HTTPS가 필요하면 Caddy를 쓴다 (체크리스트 15).
# 라우팅 규약은 Caddyfile과 동일: /api/* 와 /health 는 server로, 그 외는 client로.

server {
    listen 8080;
    listen [::]:8080;        # IPv6도 함께 (docker.md 2-3절과 동일한 이유)
    server_name _;

    # 앱이 클라이언트 IP·프로토콜을 판별하려면 X-Forwarded-* 전달이 필수 (docker.md 7절 trust proxy)
    proxy_set_header Host              $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass http://server:3000;   # Spring이면 server:8080
    }

    location = /health {
        proxy_pass http://server:3000;   # 외부 가동 감시용 (ops.md 7절). Spring이면 /actuator/health로:
                                         #   proxy_pass http://server:8080/actuator/health;
    }

    location / {
        proxy_pass http://client:8080;   # client(nginx)가 SPA fallback 처리
    }
}
